<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="client/static/css/main.css">
    <script type="module" src="client/static/js/index.js"></script>
    <title>PantryPal</title>
    <title>Document</title>
</head>
<body>
    
<div class="relative flex h-screen flex-col items-center justify-around p-10 font-sans text-cyan-50">
  <div class="flex flex-col content-stretch w-full min-w-sm justify-center-center max-sm:flex-col " id="header">
    <h1 class="text-center p-3 text-4xl text-white self-center">PantryPal</h1>
    <div class="flex flex-1 flex-col">
      <div class="flex justify-center">
        <input type="text" class="input-bar" placeholder="Search recipe..." id="recipe-search-bar"/>
        <button class="input-btn" id="search-recipe" data-href="#/recipe-search" >GO</button>
      </div>
      <div class="flex justify-center">
        <input type="text" class="input-bar" placeholder="Enter code to retrieve shopping list"/>
        <button class="input-btn">Look</button>
      </div>
    </div>
  </div>

  <div class="body-main hidden relative flex h-4/5 w-full min-w-sm flex-col rounded-xl border border-cyan-300/20 shadow-2xl shadow-black/30">
    <div class="font-outline-1 flex">
      <div class="nav-bar rounded-tl-xl border-r" id='recipe-nav' data-state="disabled" data-href="/#/recipe-search">Recipes</div>
      <div class="nav-bar  border-r hidden"  data-state="disabled" data-href="/#/recipe" id="rtab-nav"></div>
      <div class="nav-bar rounded-tr-xl " id='list-nav' data-state="disabled" data-href="/#/list">List</div>
    </div>

  <section class="section-body"></section>
  </div>
</div>
</body>
</html>
