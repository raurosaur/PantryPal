<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="client/static/css/main.css">
    <script type="module" src="client/static/js/index.js"></script>
    <script type="module" src="client/static/js/event_handlers.js"></script>
    <title>Document</title>
</head>
<body>
    
<div class="relative flex h-screen flex-col items-center justify-around p-10 font-sans text-cyan-50">
  <div class="flex w-full min-w-sm items-center max-sm:flex-col">
    <h1 class="row-span-3 text-center text-4xl text-white sm:mr-15">PantryPal</h1>
    <div class="row-span-full grid grow grid-cols-[3fr_1fr] grid-rows-1 gap-y-2 p-4">
      <input type="text" class="rounded-s-xl bg-white p-2 text-black" placeholder="Search recipe..." id="recipe-search-bar"/>
      <button class="max-w-30 rounded-e-2xl bg-[#106978] p-2" id="search-recipe" data-href="/recipe-search">GO!</button>
      <input type="text" class="rounded-s-xl bg-white p-2" />
      <button class="max-w-30 rounded-e-2xl bg-[#106978] p-2">Look</button>
    </div>
  </div>

  <div class="relative flex h-4/5 w-full min-w-sm flex-col rounded-xl border border-cyan-300/20 shadow-2xl shadow-black/30">
    <div class="font-outline-1 flex">
      <div class="nav-bar rounded-tl-xl border-r" id='recipe-nav' data-state="disabled" data-href="/recipe-search">Recipes</div>
      <div class="nav-bar rounded-tr-xl " id='list-nav' data-state="disabled" data-href="list">List</div>
    </div>

    <section class = "section-body">
    </section>
  </div>
</div>
</body>
</html>
