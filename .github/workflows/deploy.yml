name: Deploy Vite app to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check env vars
        run: |
          node -e "console.log('VITE_API_ID exists:', Boolean(process.env.VITE_API_ID))"
          node -e "console.log('VITE_API_KEY exists:', Boolean(process.env.VITE_API_KEY))"
        env:
          VITE_API_ID: ${{ secrets.VITE_API_ID }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL}}
          
      - name: Build
        run: npm run build
        
        env:
          VITE_API_ID: ${{ secrets.VITE_API_ID }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
